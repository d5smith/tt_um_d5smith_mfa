# Tiny Tapeout project information
project:
  title:        "Music for ASICs"
  author:       "d5smith"
  discord:      ""
  description:  "Autonomous generative ambient music chip using LFSR composition, scale quantization, and DDS synthesis"
  language:     "Verilog"
  clock_hz:     25000000   # 25 MHz system clock

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  # 1x2 is required: integrated cell count is ~2867, exceeds 1x1 capacity (~1000).
  tiles: "1x2"             # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Top module name (must start with "tt_um_").
  top_module:  "tt_um_d5smith_mfa"

  # List your project's source files here.
  # Source files must be in ./src and listed one per line.
  source_files:
    - "tt_um_d5smith_mfa.v"
    - "clock_divider.v"
    - "composition_engine.v"
    - "scale_quantizer.v"
    - "sound_engine.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names.
pinout:
  # Inputs (ui_in[7:0]) — configuration, all consumed
  ui[0]: "scale_sel[0]"
  ui[1]: "scale_sel[1]"
  ui[2]: "tempo_sel[0]"
  ui[3]: "tempo_sel[1]"
  ui[4]: "wave_bass[0]"
  ui[5]: "wave_bass[1]"
  ui[6]: "wave_melody[0]"
  ui[7]: "wave_melody[1]"

  # Outputs (uo_out[7:0]) — 4-bit DAC + debug
  uo[0]: "DAC bit 0 (LSB)"
  uo[1]: "DAC bit 1"
  uo[2]: "DAC bit 2"
  uo[3]: "DAC bit 3 (MSB)"
  uo[4]: "Debug: composition tick"
  uo[5]: "Debug: bass active"
  uo[6]: "Debug: melody active"
  uo[7]: "Debug: LFSR-12 MSB"

  # Bidirectional pins (uio[7:0]) — only uio[0] is driven (PWM out); rest unused
  uio[0]: "PWM audio out"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6
